    <script>

        let balance = 0;
        // let amount = 5000000;
        function deposit(amount){
            balance= balance +  amount;
            
        }
        function withdraw(amount){

                balance = balance - amount;
            }
            else{
                console.log("Low Balance");
            }
        }
        function checkBalance(){
            return balance;
        }
        let result = checkBalance();
        console.log(result);
        deposit(500000);

        // result = checkBalance;
        // console.log(result);

        withdraw(20000);

        result = checkBalance();
        console.log(result);

        function greeting(name){
            return "welcome " +  name;
        }

        let res =  greeting("vinoth");
        console.log(res);
        
        
        

    </script>

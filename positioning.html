<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <!DOCTYPE html>
<html lang="en">
    <style>

        div {
            border: 1px solid black;
            padding: 10px;
            margin: 10px;
        }
        
        .relative {
            position: relative;
            top: 20px;
            left: 30px;
        }


        /* EX:02 */

        .container {
            position: relative;
            width: 300px;
            height: 200px;
            border: 2px solid black;
            margin: 20px auto;
        }
        .absolute {
            position: absolute;
            top: 50px;
            left: 50px;
            background-color: pink;
            padding: 10px;
        }

        /* EX:04 ABSOLUTR */

            .fixed {
            position: fixed;
            top: 10px;
            right: 10px;
            background-color: lightgreen;
            padding: 20px;
            border: 2px solid black;
        }
        .content {
            height: 1200px;
            padding: 10px;
        }

        
    </style>
<head>
  <meta charset="UTF-8">
  <h1> WORK</h1>
  <title>Link CSS Example</title>
  <link rel="stylesheet" href="style.css">
  <div>Box 1</div>
  <div class="relative">Box 2</div>
</body>
</html>
